<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Ulang Tahun</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Halaman Surat -->
    <div id="envelope">
        <div class="flap"></div>
        <div class="envelope-content">
            <div class="seal">💌</div>
            <h2 style="font-size: 1.6rem;">Klik untuk membuka surat</h2>
            <p style="font-size: 1.1rem; margin-top: 10px;">Untukmu di hari spesial</p>
        </div>
    </div>

    <!-- Halaman Kartu Ulang Tahun -->
    <div id="birthday-card">
        <h1>Happy Birthday!</h1>
        <div class="cake">🎂</div>
        <p>Selamat ulang tahun yang ke-20</p>
        <p style="font-size: 2.2rem; font-weight: 600;">Semoga bahagia selalu 💕</p>
        <p style="margin-top: 30px;">Semoga panjang umur, sehat, dan sukses<br>di tahun yang baru ini ✨</p>
        
        <button class="button" onclick="window.location.reload()">Tutup & Buka Lagi</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
